<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Remedies - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      // ==================== INITIAL REMEDIES DATA ====================
      const initialRemediesData = [
        { id: 1, name: "Ginger Tea", category: "Cold & Flu", description: "Natural remedy for colds, sore throat, and nausea", ingredients: [{name: "Fresh Ginger", qty: "1 inch piece"}, {name: "Honey", qty: "2 tbsp"}, {name: "Lemon", qty: "1/2 piece"}], preparation: ["Peel and slice fresh ginger root", "Boil 2 cups of water and add ginger slices", "Simmer for 10-15 minutes", "Strain and add honey and lemon juice", "Drink warm 2-3 times daily"], rating: 4.8, image: "https://images.unsplash.com/photo-1544787219-7f47ccb76574?w=300", addedBy: "Dr. Ayurveda", contributorEmail: "ayurveda@health.com" },
        { id: 2, name: "Turmeric Milk", category: "Immunity", description: "Golden milk to boost immunity and reduce inflammation", ingredients: [{name: "Turmeric Powder", qty: "1 tsp"}, {name: "Milk", qty: "1 cup"}, {name: "Black Pepper", qty: "1 pinch"}], preparation: ["Heat 1 cup of milk in a saucepan", "Add 1 tsp turmeric powder", "Add a pinch of black pepper for absorption", "Stir well and simmer for 5 minutes", "Drink warm before bedtime"], rating: 4.9, image: "https://images.unsplash.com/photo-1615485500704-8e990f9900f7?w=300", addedBy: "Wellness Kitchen", contributorEmail: "wellness@kitchen.com" },
        { id: 3, name: "Honey & Lemon", category: "Sore Throat", description: "Soothing remedy for throat irritation and cough", ingredients: [{name: "Raw Honey", qty: "2 tbsp"}, {name: "Lemon", qty: "1/2 piece"}, {name: "Warm Water", qty: "1 cup"}], preparation: ["Heat 1 cup of water until warm (not boiling)", "Add 2 tbsp of raw honey", "Squeeze half a lemon", "Stir well and sip slowly", "Repeat 3-4 times daily"], rating: 4.7, image: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=300", addedBy: "Natural Healer", contributorEmail: "healer@natural.com" },
        { id: 4, name: "Aloe Vera Gel", category: "Skin Care", description: "Natural treatment for burns, cuts, and skin irritation", ingredients: [{name: "Fresh Aloe Vera Leaf", qty: "1 large leaf"}], preparation: ["Cut a fresh aloe vera leaf", "Extract the clear gel inside", "Apply directly to affected skin area", "Let it dry naturally", "Rinse after 20-30 minutes if needed"], rating: 4.6, image: "https://images.unsplash.com/photo-1596547609652-9cf5d8c76921?w=300", addedBy: "Skin Expert", contributorEmail: "expert@skincare.com" },
        { id: 5, name: "Peppermint Oil", category: "Headache", description: "Essential oil for headache relief and relaxation", ingredients: [{name: "Peppermint Essential Oil", qty: "2-3 drops"}, {name: "Coconut/Carrier Oil", qty: "1 tsp"}], preparation: ["Mix 2-3 drops peppermint oil with carrier oil", "Apply to temples and forehead", "Massage gently in circular motions", "Breathe deeply to inhale the aroma", "Relax in a quiet room for 15-20 minutes"], rating: 4.5, image: "https://images.unsplash.com/photo-1547793548-7a0e7dfdb24f?w=300", addedBy: "Aromatherapist", contributorEmail: "aroma@therapy.com" },
        { id: 6, name: "Apple Cider Vinegar", category: "Digestion", description: "Helps with digestion and blood sugar control", ingredients: [{name: "Apple Cider Vinegar", qty: "1-2 tbsp"}, {name: "Water", qty: "1 glass"}], preparation: ["Mix 1-2 tbsp ACV in a glass of water", "Add honey if desired for taste", "Drink before meals", "Start with small amounts", "Never drink undiluted ACV"], rating: 4.4, image: "https://images.unsplash.com/photo-1584949602334-4e99f98286a8?w=300", addedBy: "Digestive Health", contributorEmail: "digest@health.com" },
        { id: 7, name: "Chamomile Tea", category: "Sleep", description: "Calming tea for better sleep and relaxation", ingredients: [{name: "Dried Chamomile Flowers", qty: "1 tbsp"}, {name: "Honey", qty: "1 tsp"}], preparation: ["Boil 1 cup of water", "Add 1 tbsp dried chamomile flowers", "Steep for 5-10 minutes covered", "Strain and add honey to taste", "Drink 30 minutes before bedtime"], rating: 4.8, image: "https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=300", addedBy: "Sleep Wellness", contributorEmail: "sleep@wellness.com" },
        { id: 8, name: "Garlic Remedy", category: "Immunity", description: "Natural antibiotic and immune system booster", ingredients: [{name: "Fresh Garlic Cloves", qty: "2-3 cloves"}, {name: "Raw Honey", qty: "1 tbsp"}, {name: "Lemon Juice", qty: "1 tsp"}], preparation: ["Crush 2-3 fresh garlic cloves", "Let sit for 10 minutes to activate allicin", "Mix with 1 tbsp honey and lemon juice", "Consume on empty stomach", "Follow with water if taste is too strong"], rating: 4.3, image: "https://images.unsplash.com/photo-1540148426945-6cf22a6b2f64?w=300", addedBy: "Immunity Guru", contributorEmail: "immunity@guru.com" },
      ];

      const defaultImages = [
        "https://images.unsplash.com/photo-1544787219-7f47ccb76574?w=300",
        "https://images.unsplash.com/photo-1615485500704-8e990f9900f7?w=300",
        "https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=300",
        "https://images.unsplash.com/photo-1596547609652-9cf5d8c76921?w=300",
      ];

      // ==================== TOAST NOTIFICATION ====================
      const Toast = ({ message, type, onClose }) => {
        useEffect(() => {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }, [onClose]);

        return (
          <div className={`toast-notification toast-${type}`}>
            <i className={`bi ${type === 'success' ? 'bi-check-circle' : type === 'warning' ? 'bi-exclamation-triangle' : 'bi-exclamation-circle'} me-2`}></i>
            {message}
          </div>
        );
      };

      // ==================== GUEST BANNER ====================
      const GuestBanner = ({ onLogin }) => (
        <div className="guest-banner">
          <div className="container">
            <div className="d-flex align-items-center justify-content-between flex-wrap gap-2">
              <div className="d-flex align-items-center">
                <i className="bi bi-info-circle me-2"></i>
                <span>You're browsing as a <strong>Guest</strong>. Register to add your own remedies and save favorites!</span>
              </div>
              <button className="btn btn-sm btn-light" onClick={onLogin}>
                <i className="bi bi-box-arrow-in-right me-1"></i>Login / Register
              </button>
            </div>
          </div>
        </div>
      );

      // ==================== NAVBAR COMPONENT ====================
      const Navbar = ({ user, onLogout, onSearch, searchQuery }) => {
        const isGuest = user?.isGuest;

        return (
          <nav className="navbar navbar-expand-lg navbar-dark sticky-top">
            <div className="container">
              <a className="navbar-brand d-flex align-items-center" href="#">
                <div className="brand-icon me-2">
                  <i className="bi bi-heart-pulse-fill"></i>
                </div>
                <span className="gradient-text fw-bold">Home Remedies</span>
              </a>

              <button className="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span className="navbar-toggler-icon"></span>
              </button>

              <div className="collapse navbar-collapse" id="navbarNav">
                <div className="search-container mx-auto">
                  <div className="search-box">
                    <i className="bi bi-search search-icon"></i>
                    <input type="text" className="form-control search-input" placeholder="Search remedies, ingredients, symptoms..." value={searchQuery} onChange={(e) => onSearch(e.target.value)} />
                    {searchQuery && (
                      <button className="btn-clear" onClick={() => onSearch("")}>
                        <i className="bi bi-x-circle"></i>
                      </button>
                    )}
                  </div>
                </div>

                <ul className="navbar-nav ms-auto align-items-center">
                  <li className="nav-item">
                    <a className="nav-link" href="#"><i className="bi bi-house-door me-1"></i>Home</a>
                  </li>
                  {!isGuest && (
                    <li className="nav-item">
                      <a className="nav-link" href="#"><i className="bi bi-bookmark me-1"></i>Saved</a>
                    </li>
                  )}
                  <li className="nav-item dropdown">
                    <a className="nav-link dropdown-toggle d-flex align-items-center" href="#" data-bs-toggle="dropdown">
                      <div className={`user-avatar me-2 ${isGuest ? 'guest-avatar' : ''}`}>
                        <i className={`bi ${isGuest ? 'bi-person-walking' : 'bi-person-fill'}`}></i>
                      </div>
                      <span>{isGuest ? 'Guest' : user?.email?.split("@")[0] || "User"}</span>
                      {user?.isAdmin && <span className="badge bg-warning ms-2">Admin</span>}
                      {isGuest && <span className="badge bg-secondary ms-2">Guest</span>}
                    </a>
                    <ul className="dropdown-menu dropdown-menu-end">
                      {!isGuest && (
                        <>
                          <li><a className="dropdown-item" href="../Profile/Index.html"><i className="bi bi-person me-2"></i>Profile</a></li>
                          <li><a className="dropdown-item" href="../Profile/Index.html#settings"><i className="bi bi-gear me-2"></i>Settings</a></li>
                          <li><hr className="dropdown-divider" /></li>
                        </>
                      )}
                      <li><a className="dropdown-item text-danger" href="#" onClick={onLogout}><i className="bi bi-box-arrow-right me-2"></i>{isGuest ? 'Exit Guest Mode' : 'Logout'}</a></li>
                    </ul>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
        );
      };

      // ==================== ADD REMEDY MODAL ====================
      const AddRemedyModal = ({ onClose, onAdd, existingCategories, user }) => {
        const [formData, setFormData] = useState({
          name: "",
          category: "",
          customCategory: "",
          description: "",
          preparation: "",
          image: ""
        });
        const [ingredients, setIngredients] = useState([{ name: "", qty: "" }]);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [useCustomCategory, setUseCustomCategory] = useState(false);

        const handleChange = (e) => {
          setFormData({ ...formData, [e.target.name]: e.target.value });
        };

        const handleIngredientChange = (index, field, value) => {
          const updated = [...ingredients];
          updated[index][field] = value;
          setIngredients(updated);
        };

        const addIngredient = () => {
          setIngredients([...ingredients, { name: "", qty: "" }]);
        };

        const removeIngredient = (index) => {
          if (ingredients.length > 1) {
            setIngredients(ingredients.filter((_, i) => i !== index));
          }
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          setIsSubmitting(true);

          const categoryToUse = useCustomCategory ? formData.customCategory : formData.category;
          const validIngredients = ingredients.filter(i => i.name.trim());

          setTimeout(() => {
            const newRemedy = {
              id: Date.now(),
              name: formData.name,
              category: categoryToUse || "General",
              description: formData.description,
              ingredients: validIngredients,
              preparation: formData.preparation.split("\n").map(s => s.trim()).filter(s => s),
              rating: 4.0,
              image: formData.image || defaultImages[Math.floor(Math.random() * defaultImages.length)],
              addedBy: user?.name || user?.email?.split("@")[0] || "Anonymous",
              contributorEmail: user?.email || "anonymous@user.com"
            };
            onAdd(newRemedy);
            setIsSubmitting(false);
          }, 1000);
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content add-remedy-modal" onClick={(e) => e.stopPropagation()}>
              <button className="modal-close" onClick={onClose}>
                <i className="bi bi-x-lg"></i>
              </button>
              <div className="modal-body p-4">
                <div className="text-center mb-4">
                  <div className="add-icon-wrapper mb-3">
                    <i className="bi bi-plus-circle"></i>
                  </div>
                  <h2 className="gradient-text">Add New Remedy</h2>
                  <p className="text-muted">Share your natural remedy with the community</p>
                </div>

                <form onSubmit={handleSubmit}>
                  <div className="mb-3">
                    <label className="form-label"><i className="bi bi-tag me-2"></i>Remedy Name</label>
                    <input type="text" className="form-control" name="name" value={formData.name} onChange={handleChange} placeholder="e.g., Ginger Tea" required />
                  </div>

                  <div className="mb-3">
                    <label className="form-label"><i className="bi bi-grid me-2"></i>Category</label>
                    <div className="d-flex gap-2 mb-2">
                      <button type="button" className={`btn btn-sm ${!useCustomCategory ? 'btn-primary' : 'btn-outline-secondary'}`} onClick={() => setUseCustomCategory(false)}>
                        Existing
                      </button>
                      <button type="button" className={`btn btn-sm ${useCustomCategory ? 'btn-primary' : 'btn-outline-secondary'}`} onClick={() => setUseCustomCategory(true)}>
                        Custom
                      </button>
                    </div>
                    {!useCustomCategory ? (
                      <select className="form-select" name="category" value={formData.category} onChange={handleChange} required>
                        <option value="">Select a category</option>
                        {existingCategories.map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    ) : (
                      <input type="text" className="form-control" name="customCategory" value={formData.customCategory} onChange={handleChange} placeholder="e.g., Hair Care, Dental, Stress Relief" required />
                    )}
                  </div>

                  <div className="mb-3">
                    <label className="form-label"><i className="bi bi-card-text me-2"></i>Description</label>
                    <textarea className="form-control" name="description" value={formData.description} onChange={handleChange} rows="3" placeholder="Describe what this remedy helps with..." required></textarea>
                  </div>

                  <div className="mb-3">
                    <label className="form-label"><i className="bi bi-flower1 me-2"></i>Ingredients</label>
                    <div className="ingredients-input-list">
                      {ingredients.map((ing, index) => (
                        <div key={index} className="ingredient-input-row">
                          <input
                            type="text"
                            className="form-control"
                            placeholder="Ingredient name"
                            value={ing.name}
                            onChange={(e) => handleIngredientChange(index, 'name', e.target.value)}
                            required={index === 0}
                          />
                          <input
                            type="text"
                            className="form-control ingredient-qty-input"
                            placeholder="Quantity (e.g., 1 tsp)"
                            value={ing.qty}
                            onChange={(e) => handleIngredientChange(index, 'qty', e.target.value)}
                          />
                          {ingredients.length > 1 && (
                            <button type="button" className="btn btn-outline-danger btn-sm" onClick={() => removeIngredient(index)}>
                              <i className="bi bi-x"></i>
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                    <button type="button" className="btn btn-outline-secondary btn-sm mt-2" onClick={addIngredient}>
                      <i className="bi bi-plus me-1"></i>Add Ingredient
                    </button>
                  </div>

                  <div className="mb-3">
                    <label className="form-label"><i className="bi bi-list-ol me-2"></i>Preparation Steps (one per line)</label>
                    <textarea className="form-control" name="preparation" value={formData.preparation} onChange={handleChange} rows="4" placeholder="Step 1: Boil water&#10;Step 2: Add ingredients&#10;Step 3: Simmer for 10 minutes" required></textarea>
                  </div>

                  <div className="mb-4">
                    <label className="form-label"><i className="bi bi-image me-2"></i>Image URL (optional)</label>
                    <input type="url" className="form-control" name="image" value={formData.image} onChange={handleChange} placeholder="https://example.com/image.jpg" />
                    <small className="text-muted">Leave empty for a default image</small>
                  </div>

                  <div className="d-grid gap-2">
                    <button type="submit" className="btn btn-primary btn-lg" disabled={isSubmitting}>
                      {isSubmitting ? (
                        <><span className="spinner-border spinner-border-sm me-2"></span>Adding...</>
                      ) : (
                        <><i className="bi bi-plus-circle me-2"></i>Add Remedy</>
                      )}
                    </button>
                    <button type="button" className="btn btn-outline-secondary" onClick={onClose}>Cancel</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        );
      };

      // ==================== HERO SECTION ====================
      const HeroSection = ({ onSearch }) => {
        const [query, setQuery] = useState("");

        const handleSearch = (e) => {
          e.preventDefault();
          onSearch(query);
        };

        return (
          <section className="hero-section">
            <div className="hero-particles"></div>
            <div className="container">
              <div className="row justify-content-center">
                <div className="col-lg-8 text-center">
                  <h1 className="hero-title mb-3">
                    Discover Natural <span className="gradient-text">Home Remedies</span>
                  </h1>
                  <p className="hero-subtitle mb-4">
                    Find trusted, natural solutions for common health issues. Search by symptom, ingredient, or condition.
                  </p>
                  <form onSubmit={handleSearch} className="hero-search">
                    <div className="input-group">
                      <span className="input-group-text"><i className="bi bi-search"></i></span>
                      <input type="text" className="form-control" placeholder="What are you looking for? (e.g., cold, headache, immunity)" value={query} onChange={(e) => setQuery(e.target.value)} />
                      <button className="btn btn-primary" type="submit">Search</button>
                    </div>
                  </form>
                  <div className="quick-tags mt-3">
                    <span className="text-muted me-2">Popular:</span>
                    {["Cold", "Immunity", "Sleep", "Headache"].map((tag) => (
                      <button key={tag} className="btn btn-sm btn-outline-light me-2" onClick={() => onSearch(tag)}>{tag}</button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      };

      // ==================== CATEGORY FILTER ====================
      const CategoryFilter = ({ activeCategory, onCategoryChange, categories }) => (
        <div className="category-filter">
          <div className="container">
            <div className="filter-scroll">
              {categories.map((category) => (
                <button key={category} className={`filter-btn ${activeCategory === category ? "active" : ""}`} onClick={() => onCategoryChange(category)}>{category}</button>
              ))}
            </div>
          </div>
        </div>
      );

      // ==================== REMEDY CARD ====================
      const RemedyCard = ({ remedy, onView }) => {
        const [isHovered, setIsHovered] = useState(false);

        return (
          <div className={`remedy-card ${isHovered ? "hovered" : ""}`} onMouseEnter={() => setIsHovered(true)} onMouseLeave={() => setIsHovered(false)} onClick={() => onView(remedy)}>
            <div className="card-image">
              <img src={remedy.image} alt={remedy.name} />
              <div className="card-overlay">
                <button className="btn btn-light btn-sm">View Details</button>
              </div>
              <span className="category-badge">{remedy.category}</span>
              {remedy.addedBy === "user" && <span className="user-badge"><i className="bi bi-person-fill"></i></span>}
            </div>
            <div className="card-content">
              <h5 className="card-title">{remedy.name}</h5>
              <p className="card-description">{remedy.description}</p>
              <div className="card-meta">
                <small className="text-muted">
                  <i className="bi bi-person me-1"></i>
                  {remedy.addedBy || "Home Remedies"}
                </small>
              </div>
              <div className="card-footer">
                <div className="rating">
                  <i className="bi bi-star-fill text-warning"></i>
                  <span>{remedy.rating}</span>
                </div>
                <div className="ingredients">
                  <i className="bi bi-flower1 text-success me-1"></i>
                  <span>{remedy.ingredients.length} items</span>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ==================== REMEDIES GRID ====================
      const RemediesGrid = ({ remedies, onView }) => {
        if (remedies.length === 0) {
          return (
            <div className="no-results">
              <i className="bi bi-search display-1 text-muted"></i>
              <h4>No remedies found</h4>
              <p className="text-muted">Try adjusting your search or filter criteria</p>
            </div>
          );
        }

        return (
          <div className="remedies-grid">
            {remedies.map((remedy) => (
              <RemedyCard key={remedy.id} remedy={remedy} onView={onView} />
            ))}
          </div>
        );
      };

      // ==================== REMEDY MODAL ====================
      const RemedyModal = ({ remedy, onClose, user, showToast }) => {
        if (!remedy) return null;
        const isGuest = user?.isGuest;

        const handleSave = () => {
          if (isGuest) {
            showToast("Please login to save remedies", "warning");
          } else {
            showToast("Remedy saved to your collection!", "success");
          }
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
              <div className="modal-content remedy-detail-modal" onClick={(e) => e.stopPropagation()}>
                <button className="modal-close" onClick={onClose}>
                  <i className="bi bi-x-lg"></i>
                </button>
                <div className="modal-image-container" style={{ "--remedy-image": `url(${remedy.image})` }}>
                  <img src={remedy.image} alt={remedy.name} />
                  <div className="modal-image-gradient"></div>
                </div>
              <div className="modal-body">
                <div className="modal-badges mb-2">
                  <span className="category-badge">{remedy.category}</span>
                  {remedy.addedBy && remedy.addedBy !== "system" && <span className="badge bg-info ms-2">Community</span>}
                </div>
                <h2 className="gradient-text">{remedy.name}</h2>
                <div className="rating mb-3">
                  {[...Array(5)].map((_, i) => (
                    <i key={i} className={`bi bi-star-fill ${i < Math.floor(remedy.rating) ? "text-warning" : "text-muted"}`}></i>
                  ))}
                  <span className="ms-2">{remedy.rating} rating</span>
                </div>
                <p className="description">{remedy.description}</p>

                {/* Contributor Info */}
                <div className="contributor-info mb-3">
                  <div className="d-flex align-items-center">
                    <div className="contributor-avatar me-2">
                      <i className="bi bi-person-circle"></i>
                    </div>
                    <div>
                      <small className="text-muted">Contributed by</small>
                      <p className="mb-0 fw-medium">{remedy.addedBy || "Home Remedies Team"}</p>
                    </div>
                  </div>
                </div>

                <h5><i className="bi bi-flower1 me-2 text-success"></i>Ingredients</h5>
                <div className="ingredients-list-modal">
                  {remedy.ingredients.map((ing, i) => {
                    const ingredientName = typeof ing === 'object' ? ing.name : ing;
                    const ingredientQty = typeof ing === 'object' ? ing.qty : "";
                    return (
                      <div key={i} className="ingredient-item">
                        <span className="ingredient-name">
                          <i className="bi bi-check-circle me-1"></i>
                          {ingredientName}
                        </span>
                        <span className="ingredient-qty">{ingredientQty || "As needed"}</span>
                      </div>
                    );
                  })}
                </div>

                {/* Preparation Steps */}
                {remedy.preparation && remedy.preparation.length > 0 && (
                  <div className="preparation-section">
                    <h5><i className="bi bi-list-ol me-2 text-info"></i>Preparation Steps</h5>
                    <ol className="preparation-steps">
                      {remedy.preparation.map((step, i) => (
                        <li key={i}>{step}</li>
                      ))}
                    </ol>
                  </div>
                )}

                <div className="modal-actions">
                  <button className={`btn btn-lg ${isGuest ? 'btn-outline-secondary' : 'btn-primary'}`} onClick={handleSave}>
                    <i className={`bi ${isGuest ? 'bi-lock' : 'bi-bookmark'} me-2`}></i>
                    {isGuest ? 'Login to Save' : 'Save Remedy'}
                  </button>
                  <button className="btn btn-outline-light btn-lg">
                    <i className="bi bi-share me-2"></i>Share
                  </button>
                </div>
                {isGuest && (
                  <div className="guest-notice mt-3">
                    <i className="bi bi-info-circle me-2"></i>
                    <small>Register or login to save remedies and add your own!</small>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // ==================== SIDEBAR ====================
      const Sidebar = ({ user }) => {
        const isGuest = user?.isGuest;

        const quickLinks = [
          { icon: "bi-house-door", label: "Dashboard", active: true },
          { icon: "bi-search", label: "Browse Remedies" },
          { icon: "bi-bookmark", label: "Saved Remedies", requiresAuth: true },
          { icon: "bi-clock-history", label: "Recently Viewed" },
          { icon: "bi-people", label: "Community" },
        ];

        const healthTopics = [
          { icon: "bi-virus", label: "Cold & Flu", count: 24 },
          { icon: "bi-shield-check", label: "Immunity", count: 18 },
          { icon: "bi-emoji-smile", label: "Skin Care", count: 32 },
          { icon: "bi-moon-stars", label: "Sleep", count: 15 },
          { icon: "bi-heart-pulse", label: "Heart Health", count: 12 },
        ];

        return (
          <aside className="sidebar">
            <div className="sidebar-section">
              <h6 className="sidebar-title">Quick Links</h6>
              <ul className="sidebar-nav">
                {quickLinks.map((link, i) => (
                  <li key={i} className={`${link.active ? "active" : ""} ${link.requiresAuth && isGuest ? "disabled" : ""}`}>
                    <a href="#" onClick={(e) => link.requiresAuth && isGuest && e.preventDefault()}>
                      <i className={`bi ${link.icon}`}></i>
                      <span>{link.label}</span>
                      {link.requiresAuth && isGuest && <i className="bi bi-lock-fill ms-auto text-muted"></i>}
                    </a>
                  </li>
                ))}
              </ul>
            </div>

            <div className="sidebar-section">
              <h6 className="sidebar-title">Health Topics</h6>
              <ul className="sidebar-nav">
                {healthTopics.map((topic, i) => (
                  <li key={i}>
                    <a href="#">
                      <i className={`bi ${topic.icon}`}></i>
                      <span>{topic.label}</span>
                      <span className="badge">{topic.count}</span>
                    </a>
                  </li>
                ))}
              </ul>
            </div>

            {user?.isAdmin && (
              <div className="sidebar-section admin-section">
                <h6 className="sidebar-title">Admin Panel</h6>
                <ul className="sidebar-nav">
                  <li><a href="#"><i className="bi bi-people"></i><span>Manage Users</span></a></li>
                  <li><a href="#"><i className="bi bi-graph-up"></i><span>Analytics</span></a></li>
                  <li><a href="#"><i className="bi bi-gear"></i><span>Settings</span></a></li>
                </ul>
              </div>
            )}

            {isGuest && (
              <div className="sidebar-section guest-section">
                <div className="guest-cta">
                  <i className="bi bi-person-plus display-6 mb-2"></i>
                  <h6>Join Our Community</h6>
                  <p className="small text-muted mb-2">Register to add remedies and save favorites</p>
                  <a href="../Login/Index.html" className="btn btn-outline-primary btn-sm w-100">
                    <i className="bi bi-box-arrow-in-right me-1"></i>Login / Register
                  </a>
                </div>
              </div>
            )}
          </aside>
        );
      };

      // ==================== STATS CARDS ====================
      const StatsCards = ({ remedyCount }) => {
        const stats = [
          { icon: "bi-journal-medical", value: `${remedyCount}+`, label: "Remedies", color: "primary" },
          { icon: "bi-people", value: "10K+", label: "Users", color: "success" },
          { icon: "bi-flower1", value: "200+", label: "Ingredients", color: "warning" },
          { icon: "bi-star", value: "4.8", label: "Avg Rating", color: "info" },
        ];

        return (
          <div className="stats-section">
            <div className="container">
              <div className="row g-3">
                {stats.map((stat, i) => (
                  <div key={i} className="col-6 col-md-3">
                    <div className={`stat-card stat-${stat.color}`}>
                      <i className={`bi ${stat.icon}`}></i>
                      <h3>{stat.value}</h3>
                      <p>{stat.label}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      };

      // ==================== FLOATING ADD BUTTON ====================
      const FloatingAddButton = ({ onClick, isGuest }) => {
        if (isGuest) return null;

        return (
          <button className="floating-add-btn" onClick={onClick} title="Add New Remedy">
            <i className="bi bi-plus-lg"></i>
          </button>
        );
      };

      // ==================== MAIN APP ====================
      const App = () => {
        const [user, setUser] = useState(null);
        const [remedies, setRemedies] = useState(initialRemediesData);
        const [searchQuery, setSearchQuery] = useState("");
        const [activeCategory, setActiveCategory] = useState("All");
        const [selectedRemedy, setSelectedRemedy] = useState(null);
        const [showAddModal, setShowAddModal] = useState(false);
        const [toast, setToast] = useState(null);

        // Dynamically generate categories from remedies
        const categories = useMemo(() => {
          const uniqueCategories = [...new Set(remedies.map(r => r.category))];
          return ["All", ...uniqueCategories.sort()];
        }, [remedies]);

        useEffect(() => {
          const loggedUser = localStorage.getItem("homeRemediesUser");
          if (loggedUser) {
            setUser(JSON.parse(loggedUser));
          } else {
            window.location.href = "../Login/Index.html";
          }

          // Load saved remedies from localStorage
          const savedRemedies = localStorage.getItem("homeRemediesData");
          if (savedRemedies) {
            setRemedies(JSON.parse(savedRemedies));
          }
        }, []);

        const showToast = (message, type) => {
          setToast({ message, type });
        };

        const hideToast = () => {
          setToast(null);
        };

        const handleLogout = () => {
          localStorage.removeItem("homeRemediesUser");
          window.location.href = "../Login/Index.html";
        };

        const handleSearch = (query) => {
          setSearchQuery(query);
          setActiveCategory("All");
        };

        const handleAddRemedy = (newRemedy) => {
          const updatedRemedies = [newRemedy, ...remedies];
          setRemedies(updatedRemedies);
          localStorage.setItem("homeRemediesData", JSON.stringify(updatedRemedies));
          setShowAddModal(false);
          showToast("Remedy added successfully!", "success");
        };

        const handleOpenAddModal = () => {
          if (user?.isGuest) {
            showToast("Please login to add remedies", "warning");
          } else {
            setShowAddModal(true);
          }
        };

         const filteredRemedies = remedies.filter((remedy) => {
           const matchesSearch = searchQuery === "" ||
             remedy.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
             remedy.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
             remedy.category.toLowerCase().includes(searchQuery.toLowerCase()) ||
             remedy.ingredients.some((ing) => {
               const ingText = typeof ing === "object" ? `${ing.name} ${ing.qty || ""}` : ing;
               return ingText.toLowerCase().includes(searchQuery.toLowerCase());
             });

          const matchesCategory = activeCategory === "All" || remedy.category === activeCategory;

          return matchesSearch && matchesCategory;
        });

        if (!user) {
          return (
            <div className="loading-screen">
              <div className="spinner-border text-primary" role="status"></div>
              <p className="mt-3">Loading...</p>
            </div>
          );
        }

        const isGuest = user?.isGuest;
        const existingCategories = [...new Set(remedies.map(r => r.category))].sort();

        return (
          <div className="app">
            {toast && <Toast message={toast.message} type={toast.type} onClose={hideToast} />}

            {isGuest && <GuestBanner onLogin={() => window.location.href = "../Login/Index.html"} />}

            <Navbar user={user} onLogout={handleLogout} onSearch={handleSearch} searchQuery={searchQuery} />

            <HeroSection onSearch={handleSearch} />

            <StatsCards remedyCount={remedies.length} />

            <CategoryFilter activeCategory={activeCategory} onCategoryChange={setActiveCategory} categories={categories} />

            <div className="main-content">
              <div className="container-fluid">
                <div className="content-wrapper">
                  <Sidebar user={user} />
                  <main className="content-area">
                    <div className="content-header">
                      <h4>
                        {searchQuery ? `Results for "${searchQuery}"` : activeCategory === "All" ? "All Remedies" : activeCategory}
                      </h4>
                      <span className="results-count">{filteredRemedies.length} remedies found</span>
                    </div>
                    <RemediesGrid remedies={filteredRemedies} onView={setSelectedRemedy} />
                  </main>
                </div>
              </div>
            </div>

            <FloatingAddButton onClick={handleOpenAddModal} isGuest={isGuest} />

            {selectedRemedy && (
              <RemedyModal remedy={selectedRemedy} onClose={() => setSelectedRemedy(null)} user={user} showToast={showToast} />
            )}

            {showAddModal && (
              <AddRemedyModal onClose={() => setShowAddModal(false)} onAdd={handleAddRemedy} existingCategories={existingCategories} user={user} />
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
