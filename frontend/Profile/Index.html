<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Remedies - My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // ==================== TOAST NOTIFICATION ====================
      const Toast = ({ message, type, onClose }) => {
        useEffect(() => {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }, [onClose]);

        return (
          <div className={`toast-notification toast-${type}`}>
            <i className={`bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'} me-2`}></i>
            {message}
          </div>
        );
      };

      // ==================== NAVBAR ====================
      const Navbar = ({ user, onLogout }) => (
        <nav className="navbar navbar-expand-lg navbar-dark sticky-top">
          <div className="container">
            <a className="navbar-brand d-flex align-items-center" href="../Home Page/Index.html">
              <div className="brand-icon me-2">
                <i className="bi bi-heart-pulse-fill"></i>
              </div>
              <span className="gradient-text fw-bold">Home Remedies</span>
            </a>

            <div className="d-flex align-items-center gap-3">
              <a href="../Home Page/Index.html" className="btn btn-outline-light btn-sm">
                <i className="bi bi-house me-1"></i>Home
              </a>
              <div className="dropdown">
                <button className="btn btn-link nav-link dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown">
                  <div className="user-avatar me-2">
                    <i className="bi bi-person-fill"></i>
                  </div>
                  <span>{user?.name || user?.email?.split("@")[0] || "User"}</span>
                </button>
                <ul className="dropdown-menu dropdown-menu-end">
                  <li><a className="dropdown-item active" href="#"><i className="bi bi-person me-2"></i>My Profile</a></li>
                  <li><a className="dropdown-item" href="#"><i className="bi bi-bookmark me-2"></i>Saved Remedies</a></li>
                  <li><a className="dropdown-item" href="#"><i className="bi bi-gear me-2"></i>Settings</a></li>
                  <li><hr className="dropdown-divider" /></li>
                  <li><button className="dropdown-item text-danger" onClick={onLogout}><i className="bi bi-box-arrow-right me-2"></i>Logout</button></li>
                </ul>
              </div>
            </div>
          </div>
        </nav>
      );

      // ==================== PROFILE HEADER ====================
      const ProfileHeader = ({ user, stats }) => (
        <div className="profile-header">
          <div className="container">
            <div className="row align-items-center">
              <div className="col-auto">
                <div className="profile-avatar-large">
                  <i className="bi bi-person-fill"></i>
                </div>
              </div>
              <div className="col">
                <h1 className="profile-name gradient-text">{user?.name || "User"}</h1>
                <p className="profile-email"><i className="bi bi-envelope me-2"></i>{user?.email}</p>
                <div className="profile-badges">
                  {user?.isAdmin && <span className="badge bg-warning"><i className="bi bi-shield-check me-1"></i>Admin</span>}
                  <span className="badge bg-info"><i className="bi bi-calendar me-1"></i>Member since 2024</span>
                  <span className="badge bg-success"><i className="bi bi-patch-check me-1"></i>Verified</span>
                </div>
              </div>
              <div className="col-auto">
                <button className="btn btn-outline-primary">
                  <i className="bi bi-pencil me-2"></i>Edit Profile
                </button>
              </div>
            </div>

            <div className="profile-stats mt-4">
              <div className="row g-3">
                <div className="col-6 col-md-3">
                  <div className="stat-box">
                    <i className="bi bi-journal-medical text-primary"></i>
                    <h3>{stats.remediesAdded}</h3>
                    <p>Remedies Added</p>
                  </div>
                </div>
                <div className="col-6 col-md-3">
                  <div className="stat-box">
                    <i className="bi bi-bookmark-heart text-danger"></i>
                    <h3>{stats.savedRemedies}</h3>
                    <p>Saved Remedies</p>
                  </div>
                </div>
                <div className="col-6 col-md-3">
                  <div className="stat-box">
                    <i className="bi bi-star text-warning"></i>
                    <h3>{stats.avgRating}</h3>
                    <p>Avg Rating</p>
                  </div>
                </div>
                <div className="col-6 col-md-3">
                  <div className="stat-box">
                    <i className="bi bi-eye text-info"></i>
                    <h3>{stats.totalViews}</h3>
                    <p>Total Views</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      // ==================== MY REMEDIES SECTION ====================
      const MyRemedies = ({ remedies }) => (
        <div className="my-remedies-section">
          <div className="section-header">
            <h2><i className="bi bi-journal-medical me-2"></i>My Remedies</h2>
            <a href="../Home Page/Index.html" className="btn btn-primary btn-sm">
              <i className="bi bi-plus me-1"></i>Add New
            </a>
          </div>

          {remedies.length === 0 ? (
            <div className="empty-state">
              <i className="bi bi-journal-x"></i>
              <h4>No remedies yet</h4>
              <p>Start sharing your natural remedies with the community!</p>
            </div>
          ) : (
            <div className="remedies-list">
              {remedies.map((remedy) => (
                <div key={remedy.id} className="remedy-item">
                  <img src={remedy.image} alt={remedy.name} />
                  <div className="remedy-info">
                    <h5>{remedy.name}</h5>
                    <p>{remedy.description}</p>
                    <div className="remedy-meta">
                      <span className="badge bg-secondary">{remedy.category}</span>
                      <span className="rating"><i className="bi bi-star-fill text-warning me-1"></i>{remedy.rating}</span>
                    </div>
                  </div>
                  <div className="remedy-actions">
                    <button className="btn btn-sm btn-outline-primary"><i className="bi bi-pencil"></i></button>
                    <button className="btn btn-sm btn-outline-danger"><i className="bi bi-trash"></i></button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );

      // ==================== SAVED REMEDIES SECTION ====================
      const SavedRemedies = ({ savedRemedies }) => (
        <div className="saved-remedies-section">
          <div className="section-header">
            <h2><i className="bi bi-bookmark-heart me-2"></i>Saved Remedies</h2>
          </div>

          {savedRemedies.length === 0 ? (
            <div className="empty-state">
              <i className="bi bi-bookmark"></i>
              <h4>No saved remedies</h4>
              <p>Browse and save remedies you want to try later!</p>
              <a href="../Home Page/Index.html" className="btn btn-outline-primary">
                <i className="bi bi-search me-2"></i>Browse Remedies
              </a>
            </div>
          ) : (
            <div className="saved-grid">
              {savedRemedies.map((remedy) => (
                <div key={remedy.id} className="saved-card">
                  <img src={remedy.image} alt={remedy.name} />
                  <div className="saved-content">
                    <h6>{remedy.name}</h6>
                    <span className="badge bg-secondary">{remedy.category}</span>
                  </div>
                  <button className="btn-unsave" title="Remove from saved">
                    <i className="bi bi-bookmark-fill"></i>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      );

      // ==================== ACCOUNT SETTINGS ====================
      const AccountSettings = ({ user, onUpdate, showToast }) => {
        const [formData, setFormData] = useState({
          name: user?.name || "",
          email: user?.email || "",
          phone: "",
          bio: ""
        });

        const handleChange = (e) => {
          setFormData({ ...formData, [e.target.name]: e.target.value });
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          // Update user data
          const updatedUser = { ...user, name: formData.name };
          localStorage.setItem("homeRemediesUser", JSON.stringify(updatedUser));
          showToast("Profile updated successfully!", "success");
        };

        return (
          <div className="account-settings-section">
            <div className="section-header">
              <h2><i className="bi bi-gear me-2"></i>Account Settings</h2>
            </div>

            <form onSubmit={handleSubmit}>
              <div className="row g-3">
                <div className="col-md-6">
                  <label className="form-label">Full Name</label>
                  <input type="text" className="form-control" name="name" value={formData.name} onChange={handleChange} />
                </div>
                <div className="col-md-6">
                  <label className="form-label">Email Address</label>
                  <input type="email" className="form-control" name="email" value={formData.email} onChange={handleChange} disabled />
                  <small className="text-muted">Email cannot be changed</small>
                </div>
                <div className="col-md-6">
                  <label className="form-label">Phone Number</label>
                  <input type="tel" className="form-control" name="phone" value={formData.phone} onChange={handleChange} placeholder="Enter phone number" />
                </div>
                <div className="col-12">
                  <label className="form-label">Bio</label>
                  <textarea className="form-control" name="bio" value={formData.bio} onChange={handleChange} rows="3" placeholder="Tell us about yourself and your interest in natural remedies..."></textarea>
                </div>
                <div className="col-12">
                  <button type="submit" className="btn btn-primary">
                    <i className="bi bi-check-circle me-2"></i>Save Changes
                  </button>
                </div>
              </div>
            </form>

            <hr className="my-4" />

            <div className="danger-zone">
              <h5 className="text-danger"><i className="bi bi-exclamation-triangle me-2"></i>Danger Zone</h5>
              <p className="text-muted">Once you delete your account, there is no going back. Please be certain.</p>
              <button className="btn btn-outline-danger">
                <i className="bi bi-trash me-2"></i>Delete Account
              </button>
            </div>
          </div>
        );
      };

      // ==================== MAIN PROFILE APP ====================
      const ProfileApp = () => {
        const [user, setUser] = useState(null);
        const [activeTab, setActiveTab] = useState("remedies");
        const [toast, setToast] = useState(null);
        const [isLoading, setIsLoading] = useState(true);

        // Sample data - in real app, this would come from API
        const [myRemedies, setMyRemedies] = useState([]);
        const [savedRemedies, setSavedRemedies] = useState([]);

        useEffect(() => {
          // Check if user is logged in
          const userData = localStorage.getItem("homeRemediesUser");
          if (!userData) {
            window.location.href = "../Login/Index.html";
            return;
          }

          const parsedUser = JSON.parse(userData);
          if (parsedUser.isGuest) {
            window.location.href = "../Login/Index.html";
            return;
          }

          setUser(parsedUser);

          // Load user's remedies from localStorage
          const storedRemedies = localStorage.getItem("homeRemedies");
          if (storedRemedies) {
            const allRemedies = JSON.parse(storedRemedies);
            const userRemedies = allRemedies.filter(r =>
              r.contributorEmail === parsedUser.email ||
              r.addedBy === parsedUser.name ||
              r.addedBy === parsedUser.email?.split("@")[0]
            );
            setMyRemedies(userRemedies);
          }

          setIsLoading(false);
        }, []);

        const handleLogout = () => {
          localStorage.removeItem("homeRemediesUser");
          window.location.href = "../Login/Index.html";
        };

        const showToast = (message, type) => {
          setToast({ message, type });
        };

        const hideToast = () => {
          setToast(null);
        };

        const stats = {
          remediesAdded: myRemedies.length,
          savedRemedies: savedRemedies.length,
          avgRating: myRemedies.length > 0 ? (myRemedies.reduce((acc, r) => acc + r.rating, 0) / myRemedies.length).toFixed(1) : "0.0",
          totalViews: Math.floor(Math.random() * 500) + 100
        };

        if (isLoading) {
          return (
            <div className="loading-screen">
              <div className="spinner-border text-primary" role="status">
                <span className="visually-hidden">Loading...</span>
              </div>
              <p className="mt-3 text-muted">Loading profile...</p>
            </div>
          );
        }

        return (
          <>
            {toast && <Toast message={toast.message} type={toast.type} onClose={hideToast} />}

            <Navbar user={user} onLogout={handleLogout} />

            <ProfileHeader user={user} stats={stats} />

            <div className="profile-content">
              <div className="container">
                <div className="profile-tabs">
                  <button className={`tab-btn ${activeTab === "remedies" ? "active" : ""}`} onClick={() => setActiveTab("remedies")}>
                    <i className="bi bi-journal-medical me-2"></i>My Remedies
                  </button>
                  <button className={`tab-btn ${activeTab === "saved" ? "active" : ""}`} onClick={() => setActiveTab("saved")}>
                    <i className="bi bi-bookmark-heart me-2"></i>Saved
                  </button>
                  <button className={`tab-btn ${activeTab === "settings" ? "active" : ""}`} onClick={() => setActiveTab("settings")}>
                    <i className="bi bi-gear me-2"></i>Settings
                  </button>
                </div>

                <div className="tab-content">
                  {activeTab === "remedies" && <MyRemedies remedies={myRemedies} />}
                  {activeTab === "saved" && <SavedRemedies savedRemedies={savedRemedies} />}
                  {activeTab === "settings" && <AccountSettings user={user} showToast={showToast} />}
                </div>
              </div>
            </div>
          </>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ProfileApp />);
    </script>
  </body>
</html>
