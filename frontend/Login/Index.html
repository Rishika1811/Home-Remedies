<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Remedies - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // ==================== USER CREDENTIALS DATABASE ====================
      const USERS_DB = {
        users: [
          {
            email: "test1@gmail.com",
            password: "abc",
            name: "Test User",
            isAdmin: false,
          },
        ],
        admins: [
          {
            email: "admin",
            password: "admin",
            name: "Administrator",
            isAdmin: true,
          },
        ],
      };

      // ==================== TOAST NOTIFICATION ====================
      const Toast = ({ message, type, onClose }) => {
        useEffect(() => {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }, [onClose]);

        return (
          <div className={`toast-notification toast-${type}`}>
            <i
              className={`bi ${type === "success" ? "bi-check-circle" : "bi-exclamation-circle"} me-2`}
            ></i>
            {message}
          </div>
        );
      };

      // ==================== PARTICLE COMPONENTS ====================
      const Particle = ({ style }) => (
        <div className="particle" style={style} />
      );

      const ParticlesBackground = () => {
        const [particles, setParticles] = useState([]);

        useEffect(() => {
          const particleCount = 50;
          const newParticles = [];
          for (let i = 0; i < particleCount; i++) {
            const size = 2 + Math.random() * 4;
            newParticles.push({
              id: i,
              left: `${Math.random() * 100}%`,
              animationDelay: `${Math.random() * 15}s`,
              animationDuration: `${15 + Math.random() * 10}s`,
              width: `${size}px`,
              height: `${size}px`,
            });
          }
          setParticles(newParticles);
        }, []);

        return (
          <div className="particles" id="particles">
            {particles.map((p) => (
              <Particle
                key={p.id}
                style={{
                  left: p.left,
                  animationDelay: p.animationDelay,
                  animationDuration: p.animationDuration,
                  width: p.width,
                  height: p.height,
                }}
              />
            ))}
          </div>
        );
      };

      // ==================== GUEST BUTTON COMPONENT ====================
      const GuestButton = () => {
        const [isLoading, setIsLoading] = useState(false);
        const [isSuccess, setIsSuccess] = useState(false);

        const handleClick = () => {
          setIsLoading(true);
          setTimeout(() => {
            setIsLoading(false);
            setIsSuccess(true);
            // Save guest user to localStorage
            const guestUser = {
              email: "guest@home-remedies.com",
              name: "Guest",
              isAdmin: false,
              isGuest: true,
            };
            localStorage.setItem("homeRemediesUser", JSON.stringify(guestUser));
            setTimeout(() => {
              window.location.href = "../Home Page/Index.html";
            }, 1000);
          }, 1000);
        };

        return (
          <button
            type="button"
            className={`btn ${isSuccess ? "btn-success" : "btn-outline-secondary"}`}
            onClick={handleClick}
            disabled={isLoading}
          >
            {isLoading ? (
              <>
                <span className="spinner-border spinner-border-sm me-2"></span>
                Loading...
              </>
            ) : isSuccess ? (
              <>
                <i className="bi bi-check-circle me-2"></i>Welcome, Guest!
              </>
            ) : (
              <>
                <i className="bi bi-person-walking me-2"></i>Continue as Guest
              </>
            )}
          </button>
        );
      };

      // ==================== LOGIN FORM COMPONENT ====================
      const LoginForm = ({ onShowRegister, onShowSignUp, showToast }) => {
        const [userType, setUserType] = useState("user");
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [rememberMe, setRememberMe] = useState(false);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [submitSuccess, setSubmitSuccess] = useState(false);
        const [error, setError] = useState("");

        const handleSubmit = (e) => {
          e.preventDefault();
          setIsSubmitting(true);
          setError("");

          setTimeout(() => {
            // Authenticate user
            let authenticatedUser = null;

            if (userType === "admin") {
              authenticatedUser = USERS_DB.admins.find(
                (u) => u.email === email && u.password === password,
              );
            } else {
              authenticatedUser = USERS_DB.users.find(
                (u) => u.email === email && u.password === password,
              );
            }

            if (authenticatedUser) {
              setIsSubmitting(false);
              setSubmitSuccess(true);
              showToast("Login successful! Redirecting...", "success");

              // Save user to localStorage
              localStorage.setItem(
                "homeRemediesUser",
                JSON.stringify(authenticatedUser),
              );

              setTimeout(() => {
                window.location.href = "../Home Page/Index.html";
              }, 1500);
            } else {
              setIsSubmitting(false);
              setError("Invalid email or password");
              showToast("Invalid email or password", "error");
            }
          }, 1000);
        };

        return (
          <form onSubmit={handleSubmit}>
            <div className="user-type-toggle mb-2">
              <div className="btn-group w-100" role="group">
                <input
                  type="radio"
                  className="btn-check"
                  name="userType"
                  id="userLogin"
                  value="user"
                  checked={userType === "user"}
                  onChange={(e) => setUserType(e.target.value)}
                />
                <label className="btn btn-outline-primary" htmlFor="userLogin">
                  <i className="bi bi-person me-2"></i>User
                </label>
                <input
                  type="radio"
                  className="btn-check"
                  name="userType"
                  id="adminLogin"
                  value="admin"
                  checked={userType === "admin"}
                  onChange={(e) => setUserType(e.target.value)}
                />
                <label className="btn btn-outline-primary" htmlFor="adminLogin">
                  <i className="bi bi-shield-lock me-2"></i>Admin
                </label>
              </div>
            </div>

            {/* Credentials Hint */}
            <div className="credentials-hint mb-2">
              <small className="text-muted">
                <i className="bi bi-info-circle me-1"></i>
                {userType === "admin"
                  ? "Admin: admin / admin"
                  : "User: test1@gmail.com / abc"}
              </small>
            </div>

            {error && (
              <div className="alert alert-danger py-2 mb-2" role="alert">
                <i className="bi bi-exclamation-triangle me-2"></i>
                {error}
              </div>
            )}

            <div className="form-floating mb-2">
              <input
                type={userType === "admin" ? "text" : "email"}
                className="form-control form-control-sm"
                id="loginEmail"
                placeholder="name@example.com"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                required
              />
              <label htmlFor="loginEmail">
                <i className="bi bi-envelope me-2"></i>
                {userType === "admin" ? "Username" : "Email"}
              </label>
            </div>

            <div className="form-floating mb-2">
              <input
                type="password"
                className="form-control form-control-sm"
                id="loginPassword"
                placeholder="Password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                required
              />
              <label htmlFor="loginPassword">
                <i className="bi bi-lock me-2"></i>Password
              </label>
            </div>

            <div className="d-flex justify-content-between align-items-center mb-2">
              <div className="form-check">
                <input
                  className="form-check-input"
                  type="checkbox"
                  id="rememberMe"
                  checked={rememberMe}
                  onChange={(e) => setRememberMe(e.target.checked)}
                />
                <label className="form-check-label small" htmlFor="rememberMe">
                  Remember me
                </label>
              </div>
              <a href="#" className="small text-primary">
                Forgot password?
              </a>
            </div>

            <div className="d-grid gap-2 mb-2">
              <button
                type="submit"
                className={`btn btn-glow ${submitSuccess ? "btn-success" : "btn-primary"}`}
                disabled={isSubmitting}
              >
                {isSubmitting ? (
                  <>
                    <span className="spinner-border spinner-border-sm me-2"></span>
                    Signing in...
                  </>
                ) : submitSuccess ? (
                  <>
                    <i className="bi bi-check-circle me-2"></i>Success!
                  </>
                ) : (
                  <>
                    <i className="bi bi-box-arrow-in-right me-2"></i>Sign In
                  </>
                )}
              </button>
            </div>

            <div className="d-grid">
              <GuestButton />
            </div>

            <div className="divider my-2">
              <span>New here?</span>
            </div>

            <div className="row g-2">
              <div className="col-6">
                <button
                  type="button"
                  className="btn btn-outline-info w-100"
                  onClick={onShowRegister}
                >
                  <i className="bi bi-person-plus me-1"></i>Register
                </button>
              </div>
              <div className="col-6">
                <button
                  type="button"
                  className="btn btn-outline-success w-100"
                  onClick={onShowSignUp}
                >
                  <i className="bi bi-pencil-square me-1"></i>Sign Up
                </button>
              </div>
            </div>
          </form>
        );
      };

      // ==================== REGISTER FORM COMPONENT ====================
      const RegisterForm = ({ onShowLogin, showToast }) => {
        const [formData, setFormData] = useState({
          name: "",
          email: "",
          password: "",
          confirmPassword: "",
        });
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [submitSuccess, setSubmitSuccess] = useState(false);

        const handleChange = (e) => {
          setFormData({ ...formData, [e.target.name]: e.target.value });
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          if (formData.password !== formData.confirmPassword) {
            showToast("Passwords do not match", "error");
            return;
          }
          setIsSubmitting(true);
          setTimeout(() => {
            setIsSubmitting(false);
            setSubmitSuccess(true);
            showToast("Registration successful! Please login.", "success");
            setTimeout(() => {
              onShowLogin();
            }, 2000);
          }, 1500);
        };

        return (
          <>
            <div className="d-flex align-items-center mb-3">
              <button
                className="btn btn-link text-muted p-0 me-3"
                onClick={onShowLogin}
              >
                <i className="bi bi-arrow-left fs-5"></i>
              </button>
              <h2 className="h5 mb-0 gradient-text">Create Account</h2>
            </div>
            <form onSubmit={handleSubmit}>
              <div className="form-floating mb-2">
                <input
                  type="text"
                  className="form-control form-control-sm"
                  id="regName"
                  name="name"
                  placeholder="Full Name"
                  value={formData.name}
                  onChange={handleChange}
                  required
                />
                <label htmlFor="regName">
                  <i className="bi bi-person me-2"></i>Full Name
                </label>
              </div>
              <div className="form-floating mb-2">
                <input
                  type="email"
                  className="form-control form-control-sm"
                  id="regEmail"
                  name="email"
                  placeholder="Email"
                  value={formData.email}
                  onChange={handleChange}
                  required
                />
                <label htmlFor="regEmail">
                  <i className="bi bi-envelope me-2"></i>Email
                </label>
              </div>
              <div className="form-floating mb-2">
                <input
                  type="password"
                  className="form-control form-control-sm"
                  id="regPassword"
                  name="password"
                  placeholder="Password"
                  value={formData.password}
                  onChange={handleChange}
                  required
                />
                <label htmlFor="regPassword">
                  <i className="bi bi-lock me-2"></i>Password
                </label>
              </div>
              <div className="form-floating mb-3">
                <input
                  type="password"
                  className="form-control form-control-sm"
                  id="regConfirmPassword"
                  name="confirmPassword"
                  placeholder="Confirm Password"
                  value={formData.confirmPassword}
                  onChange={handleChange}
                  required
                />
                <label htmlFor="regConfirmPassword">
                  <i className="bi bi-lock-fill me-2"></i>Confirm Password
                </label>
              </div>
              <div className="d-grid">
                <button
                  type="submit"
                  className={`btn btn-glow ${submitSuccess ? "btn-success" : "btn-info"}`}
                  disabled={isSubmitting}
                >
                  {isSubmitting ? (
                    <>
                      <span className="spinner-border spinner-border-sm me-2"></span>
                      Processing...
                    </>
                  ) : submitSuccess ? (
                    <>
                      <i className="bi bi-check-circle me-2"></i>Success!
                    </>
                  ) : (
                    <>
                      <i className="bi bi-person-plus me-2"></i>Register
                    </>
                  )}
                </button>
              </div>
            </form>
          </>
        );
      };

      // ==================== SIGN UP FORM COMPONENT ====================
      const SignUpForm = ({ onShowLogin, showToast }) => {
        const [formData, setFormData] = useState({
          name: "",
          email: "",
          phone: "",
          password: "",
        });
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [submitSuccess, setSubmitSuccess] = useState(false);

        const handleChange = (e) => {
          setFormData({ ...formData, [e.target.name]: e.target.value });
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          setIsSubmitting(true);
          setTimeout(() => {
            setIsSubmitting(false);
            setSubmitSuccess(true);
            showToast("Sign up successful! Please login.", "success");
            setTimeout(() => {
              onShowLogin();
            }, 2000);
          }, 1500);
        };

        return (
          <>
            <div className="d-flex align-items-center mb-3">
              <button
                className="btn btn-link text-muted p-0 me-3"
                onClick={onShowLogin}
              >
                <i className="bi bi-arrow-left fs-5"></i>
              </button>
              <h2 className="h5 mb-0 gradient-text">Sign Up</h2>
            </div>
            <form onSubmit={handleSubmit}>
              <div className="form-floating mb-2">
                <input
                  type="text"
                  className="form-control form-control-sm"
                  id="signUpName"
                  name="name"
                  placeholder="Full Name"
                  value={formData.name}
                  onChange={handleChange}
                  required
                />
                <label htmlFor="signUpName">
                  <i className="bi bi-person me-2"></i>Full Name
                </label>
              </div>
              <div className="form-floating mb-2">
                <input
                  type="email"
                  className="form-control form-control-sm"
                  id="signUpEmail"
                  name="email"
                  placeholder="Email"
                  value={formData.email}
                  onChange={handleChange}
                  required
                />
                <label htmlFor="signUpEmail">
                  <i className="bi bi-envelope me-2"></i>Email
                </label>
              </div>
              <div className="form-floating mb-2">
                <input
                  type="tel"
                  className="form-control form-control-sm"
                  id="signUpPhone"
                  name="phone"
                  placeholder="Phone Number"
                  value={formData.phone}
                  onChange={handleChange}
                  required
                />
                <label htmlFor="signUpPhone">
                  <i className="bi bi-phone me-2"></i>Phone Number
                </label>
              </div>
              <div className="form-floating mb-3">
                <input
                  type="password"
                  className="form-control form-control-sm"
                  id="signUpPassword"
                  name="password"
                  placeholder="Password"
                  value={formData.password}
                  onChange={handleChange}
                  required
                />
                <label htmlFor="signUpPassword">
                  <i className="bi bi-lock me-2"></i>Password
                </label>
              </div>
              <div className="d-grid">
                <button
                  type="submit"
                  className={`btn btn-glow btn-success`}
                  disabled={isSubmitting}
                >
                  {isSubmitting ? (
                    <>
                      <span className="spinner-border spinner-border-sm me-2"></span>
                      Processing...
                    </>
                  ) : submitSuccess ? (
                    <>
                      <i className="bi bi-check-circle me-2"></i>Success!
                    </>
                  ) : (
                    <>
                      <i className="bi bi-check-circle me-2"></i>Sign Up
                    </>
                  )}
                </button>
              </div>
            </form>
          </>
        );
      };

      // ==================== MAIN AUTH CARD COMPONENT ====================
      const AuthCard = () => {
        const [activeForm, setActiveForm] = useState("login");
        const [isAnimating, setIsAnimating] = useState(false);
        const [toast, setToast] = useState(null);

        const switchForm = (formName) => {
          if (isAnimating) return;
          setIsAnimating(true);
          setTimeout(() => {
            setActiveForm(formName);
            setIsAnimating(false);
          }, 300);
        };

        const showToast = (message, type) => {
          setToast({ message, type });
        };

        const hideToast = () => {
          setToast(null);
        };

        return (
          <>
            {toast && (
              <Toast
                message={toast.message}
                type={toast.type}
                onClose={hideToast}
              />
            )}
            <div className="main-container">
              <div
                className={`card auth-card ${isAnimating ? "card-animating" : ""}`}
                id="authCard"
              >
                <div className="card-body p-3">
                  <div className="header text-center mb-2">
                    <div className="logo-wrapper-sm mb-2">
                      <i className="bi bi-heart-pulse-fill logo-icon-sm"></i>
                    </div>
                    <h1 className="h4 fw-bold gradient-text mb-1">
                      Home Remedies
                    </h1>
                    <p className="text-muted small mb-0">
                      Your Natural Health Solution
                    </p>
                  </div>

                  <div
                    className={`form-section ${activeForm === "login" ? "active" : ""}`}
                  >
                    {activeForm === "login" && (
                      <LoginForm
                        onShowRegister={() => switchForm("register")}
                        onShowSignUp={() => switchForm("signup")}
                        showToast={showToast}
                      />
                    )}
                  </div>

                  <div
                    className={`form-section ${activeForm === "register" ? "active" : ""}`}
                  >
                    {activeForm === "register" && (
                      <RegisterForm
                        onShowLogin={() => switchForm("login")}
                        showToast={showToast}
                      />
                    )}
                  </div>

                  <div
                    className={`form-section ${activeForm === "signup" ? "active" : ""}`}
                  >
                    {activeForm === "signup" && (
                      <SignUpForm
                        onShowLogin={() => switchForm("login")}
                        showToast={showToast}
                      />
                    )}
                  </div>
                </div>
              </div>
            </div>
          </>
        );
      };

      // ==================== MAIN APP COMPONENT ====================
      const App = () => {
        // Check if already logged in
        useEffect(() => {
          const loggedUser = localStorage.getItem("homeRemediesUser");
          if (loggedUser) {
            window.location.href = "../Home Page/Index.html";
          }
        }, []);

        return (
          <>
            <ParticlesBackground />
            <AuthCard />
          </>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
